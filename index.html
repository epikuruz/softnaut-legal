<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bystronaut</title>
<style>
  :root { color-scheme: light dark; }
  body {
    max-width: 540px;
    margin: 4rem auto;
    padding: 0 1.25rem;
    font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: #222;
    text-align: center;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #111; color: #e9e9e9; }
    a { color: #8ab4ff; }
  }
  h1 { font-size: 2rem; margin-bottom: 0.25rem; }
  p.tag { color: #888; margin-top: 0; margin-bottom: 3rem; }
  .apps { list-style: none; padding: 0; margin: 0; }
  .apps li { margin-bottom: 2rem; }
  .apps li a.app-name { font-size: 1.25rem; font-weight: 600; text-decoration: none; display: block; margin-bottom: 0.15rem; }
  .apps li a.app-name:hover { text-decoration: underline; }
  .apps li p { color: #888; font-size: 0.9rem; margin: 0; }
</style>
</head>
<body>
  <h1>Bystronaut</h1>
  <p class="tag">Apps built to help you learn and communicate.</p>
  <ul class="apps">
    <li>
      <a class="app-name" href="./mathonaut/">Mathonaut</a>
      <p>Mental math speed trainer for kids 5–15.</p>
    </li>
    <li>
      <a class="app-name" href="./lingonaut/">Lingonaut</a>
      <p>Language learning app.</p>
    </li>
  </ul>
</body>
</html>
