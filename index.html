<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bystronaut</title>
<style>
  :root { color-scheme: light dark; }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #0F0E2A;
    color: #F2F8FF;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
  }

  a { color: #3DC8C0; text-decoration: none; }
  a:hover { text-decoration: underline; }

  .brand {
    text-align: center;
    margin-bottom: 3rem;
  }

  .brand-name {
    font-size: 2.25rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: #F2F8FF;
    margin-bottom: 0.3rem;
  }

  .brand-tag {
    color: #4A6080;
    font-size: 0.95rem;
  }

  .apps {
    list-style: none;
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .app-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(61,200,192,0.15);
    border-radius: 16px;
    padding: 1.25rem 1.4rem;
    display: flex;
    align-items: center;
    gap: 1.1rem;
    text-decoration: none;
    transition: background 0.15s, border-color 0.15s;
  }

  .app-card:hover {
    background: rgba(61,200,192,0.07);
    border-color: rgba(61,200,192,0.35);
    text-decoration: none;
  }

  .app-card img {
    width: 64px;
    height: 64px;
    border-radius: 14px;
    flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(61,200,192,0.2);
  }

  .app-info {
    text-align: left;
  }

  .app-name {
    font-size: 1.1rem;
    font-weight: 700;
    color: #F2F8FF;
    display: block;
    margin-bottom: 0.15rem;
  }

  .app-desc {
    color: #4A6080;
    font-size: 0.9rem;
  }

  .app-links {
    margin-top: 0.45rem;
    font-size: 0.8rem;
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .app-links a {
    color: #3DC8C0;
    opacity: 0.7;
  }

  .app-links a:hover { opacity: 1; text-decoration: underline; }

  footer {
    margin-top: 3rem;
    color: #2A3A52;
    font-size: 0.8rem;
    text-align: center;
  }
</style>
</head>
<body>

  <div class="brand">
    <div class="brand-name">Bystronaut</div>
    <div class="brand-tag">Apps built to help you learn and communicate.</div>
  </div>

  <ul class="apps">
    <li>
      <a class="app-card" href="./mathonaut/">
        <img src="./mathonaut/icon.svg" alt="Mathonaut icon">
        <div class="app-info">
          <span class="app-name">Mathonaut</span>
          <span class="app-desc">Mental math speed trainer.</span>
          <div class="app-links">
            <a href="./mathonaut/about.html">About</a>
            <a href="./mathonaut/privacy.html">Privacy</a>
            <a href="./mathonaut/terms.html">Terms</a>
          </div>
        </div>
      </a>
    </li>
    <li>
      <a class="app-card" href="./lingonaut/">
        <div class="app-info">
          <span class="app-name">Lingonaut</span>
          <span class="app-desc">Language learning app.</span>
          <div class="app-links">
            <a href="./lingonaut/privacy.html">Privacy</a>
          </div>
        </div>
      </a>
    </li>
  </ul>

  <footer>
    &copy; 2026 Bystronaut
  </footer>

</body>
</html>
